<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="last-modified" content="2026-06-16">
    <title>VTT Text Extractor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='80'>📝</text></svg>">
    <script>
        // Apply the saved (or system) theme before first paint to avoid a flash.
        (function () {
            try {
                var t = localStorage.getItem('vtt_theme');
                if (!t) t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
                if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            } catch (e) {}
        })();
    </script>
    <style>
        :root {
            --bg-grad-1: #667eea;
            --bg-grad-2: #764ba2;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text: #1e293b;
            --text-muted: #64748b;
            --heading: #6366f1;
            --border: #e2e8f0;
            --input-bg: #ffffff;
            --output-bg: #f8fafc;
            --on-grad: #ffffff;
            color-scheme: light;
        }

        html[data-theme="dark"] {
            --bg-grad-1: #1e1b4b;
            --bg-grad-2: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.95);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --heading: #a5b4fc;
            --border: #334155;
            --input-bg: #0f172a;
            --output-bg: #0b1220;
            --on-grad: #f1f5f9;
            color-scheme: dark;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: var(--on-grad);
            margin-bottom: 2rem;
            animation: fadeInDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1rem;
            opacity: 0.95;
            max-width: 640px;
            margin: 0 auto;
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1001;
            width: 46px;
            height: 46px;
            padding: 0;
            border: none;
            border-radius: 50%;
            background: var(--card-bg);
            color: var(--heading);
            font-size: 1.25rem;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease;
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.6s ease-out;
            transition: background 0.4s ease;
        }

        .card h2 {
            font-size: 1.2rem;
            color: var(--heading);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        textarea {
            width: 100%;
            min-height: 220px;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text);
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            resize: vertical;
            transition: all 0.25s ease;
            scrollbar-width: thin;
            scrollbar-color: var(--heading) transparent;
        }

        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: var(--heading); border-radius: 10px; }

        textarea:focus {
            outline: none;
            border-color: var(--heading);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.75;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        /* Equal-width buttons that grow to fill the row and wrap as whole units. */
        .button-group > button {
            flex: 1 1 150px;
            white-space: nowrap;
        }

        button {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        button:hover::before { left: 100%; }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .secondary-btn {
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
            box-shadow: 0 2px 8px rgba(100, 116, 139, 0.2);
        }

        .secondary-btn:hover {
            box-shadow: 0 8px 20px rgba(100, 116, 139, 0.4);
        }

        .success-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.2);
        }

        .success-btn:hover {
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        #output {
            white-space: pre-wrap;
            padding: 1rem;
            background: var(--output-bg);
            border-radius: 12px;
            border: 2px solid var(--border);
            color: var(--text);
            min-height: 140px;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.8;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        #output:empty::before {
            content: 'Your extracted text will appear here…';
            color: var(--text-muted);
        }

        #output::-webkit-scrollbar { width: 8px; }
        #output::-webkit-scrollbar-track { background: var(--border); border-radius: 10px; }
        #output::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        #output::-webkit-scrollbar-thumb:hover { background: #4f46e5; }

        .footer {
            text-align: center;
            color: var(--on-grad);
            margin-top: 2rem;
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .footer a {
            color: var(--on-grad);
            text-decoration: underline;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 540px) {
            .header h1 { font-size: 1.9rem; }
            .button-group { flex-direction: column; }
            .button-group button { width: 100%; }
        }
    </style>
</head>
<body>
    <button type="button" id="themeToggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode" title="Toggle light / dark">🌙</button>

    <div class="container">
        <div class="header">
            <h1>📝 VTT Text Extractor</h1>
            <p>Clean up and extract text from VTT caption files — strip the timestamps and tags, keep the words.</p>
        </div>

        <div class="card">
            <h2>📥 Input VTT</h2>
            <textarea id="input" placeholder="Paste your VTT content here…"></textarea>
            <div class="button-group">
                <button type="button" onclick="extract()">🔄 Extract Text</button>
                <button type="button" onclick="clearInput()" class="secondary-btn">🗑️ Clear</button>
            </div>
        </div>

        <div class="card">
            <h2>📤 Extracted Text</h2>
            <div id="output"></div>
            <div class="button-group">
                <button type="button" onclick="copyText()" class="success-btn">📋 Copy Text</button>
            </div>
        </div>

        <div class="footer">
            Last Modified: 2026-06-16 | Made with ❤️ for subtitle enthusiasts | Made By Krishna Kanth B <a href="https://krishnakanthb13.github.io/" target="_blank">BKK©</a>
        </div>
    </div>

    <script>
        // --- Lightweight non-blocking toast -----------------------------------------
        function toast(msg) {
            let t = document.getElementById('toast');
            if (!t) {
                t = document.createElement('div');
                t.id = 'toast';
                t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:0.75rem 1.25rem;border-radius:12px;font-size:0.9rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.25);opacity:0;transition:all 0.3s ease;z-index:1000;pointer-events:none;max-width:90vw;text-align:center;';
                document.body.appendChild(t);
            }
            t.textContent = msg;
            requestAnimationFrame(() => {
                t.style.opacity = '1';
                t.style.transform = 'translateX(-50%) translateY(0)';
            });
            clearTimeout(t._timer);
            t._timer = setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translateX(-50%) translateY(20px)';
            }, 2200);
        }

        // --- Light / dark theme -----------------------------------------------------
        function currentTheme() {
            return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        }
        function applyThemeIcon() {
            const b = document.getElementById('themeToggle');
            if (b) b.textContent = currentTheme() === 'dark' ? '☀️' : '🌙';
        }
        function toggleTheme() {
            const next = currentTheme() === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            try { localStorage.setItem('vtt_theme', next); } catch (e) {}
            applyThemeIcon();
        }
        document.addEventListener('DOMContentLoaded', applyThemeIcon);

        function extract() {
            const input = document.getElementById('input').value;
            const lines = input.split('\n');
            let result = [];
            let isHeader = true;

            for (const line of lines) {
                // Skip header section
                if (isHeader) {
                    if (line.trim() === '') {
                        isHeader = false;
                    }
                    continue;
                }

                // Skip lines with technical information
                if (line.includes('-->') ||
                    line.includes('align:') ||
                    line.includes('position:') ||
                    line.trim() === '') {
                    continue;
                }

                // Clean the line of timestamps and tags
                let cleanLine = line.replace(/<\d{2}:\d{2}:\d{2}\.\d{3}>/g, '');
                // Strip any remaining VTT cue tags (<c>, </c>, <c.color>, …),
                // looping until stable so leftovers can't recombine into a tag.
                let prevLine;
                do { prevLine = cleanLine; cleanLine = cleanLine.replace(/<[^>]*>/g, ''); }
                while (cleanLine !== prevLine);
                cleanLine = cleanLine.trim();

                if (cleanLine) {
                    // Only add if we haven't seen this exact text before
                    if (!result.includes(cleanLine)) {
                        result.push(cleanLine);
                    }
                }
            }

            document.getElementById('output').textContent = result.join(' ');
        }

        function clearInput() {
            document.getElementById('input').value = '';
            document.getElementById('output').textContent = '';
        }

        function copyText() {
            const output = document.getElementById('output');
            if (!output.textContent.trim()) {
                toast('⚠️ Nothing to copy — extract some text first!');
                return;
            }
            navigator.clipboard.writeText(output.textContent)
                .then(() => toast('✅ Text copied to clipboard!'));
        }
    </script>
</body>
</html>
