<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Flirt Engine ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #FDF6F0;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    color: #1a1a1a;
  }

  .wrap {
    max-width: 620px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 36px;
    font-weight: 400;
    color: #1a1a1a;
    letter-spacing: -0.5px;
  }

  .sub {
    font-size: 14px;
    color: #777;
    margin-top: 6px;
  }

  .pills {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .pill {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid #e0c8c0;
    color: #993556;
    background: #fff0f4;
  }

  .card {
    background: white;
    border-radius: 16px;
    border: 1px solid #f0e0d8;
    padding: 1.5rem;
    margin-bottom: 1rem;
    box-shadow: 0 2px 12px rgba(180,80,80,0.04);
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
  }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row.three { grid-template-columns: 1fr 1fr 1fr; }

  .field { display: flex; flex-direction: column; gap: 5px; }

  .field label {
    font-size: 11px;
    color: #888;
    font-weight: 500;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  input[type=text], textarea, select {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #e8d5cc;
    background: #fefaf8;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input[type=text]:focus, textarea:focus {
    border-color: #D4537E;
    background: white;
  }

  textarea { resize: vertical; min-height: 72px; }

  .vibe-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .vibe-btn {
    padding: 10px 6px;
    border-radius: 10px;
    border: 1px solid #e8d5cc;
    background: white;
    color: #888;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s ease;
    user-select: none;
  }

  .vibe-btn:hover { background: #fff0f4; border-color: #D4537E; color: #993556; }

  .vibe-btn.selected {
    border-color: #D4537E;
    background: #fde8ef;
    color: #72243E;
    font-weight: 500;
  }

  .go-btn {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #D4537E 0%, #c03b6a 100%);
    color: white;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 19px;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 4px 20px rgba(180,60,100,0.25);
  }

  .go-btn:hover { opacity: 0.92; transform: translateY(-1px); }
  .go-btn:active { transform: scale(0.99); }
  .go-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .loading {
    text-align: center;
    padding: 2.5rem;
    color: #993556;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 17px;
    display: none;
  }

  .loading.visible { display: block; }

  .loading-dots::after {
    content: '';
    animation: dots 1.4s infinite;
  }

  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }

  .result-area { display: none; margin-top: 1.5rem; }
  .result-area.visible { display: block; }

  .result-label {
    font-size: 11px;
    font-weight: 500;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
    text-align: center;
  }

  .line-card {
    background: white;
    border: 1px solid #f0e0d8;
    border-radius: 14px;
    padding: 1.25rem 1.25rem 1rem;
    margin-bottom: 10px;
    position: relative;
    transition: box-shadow 0.2s;
  }

  .line-card:hover { box-shadow: 0 3px 16px rgba(180,60,100,0.08); }

  .line-tag {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 8px;
  }

  .tag-charming { color: #993556; }
  .tag-funny { color: #854F0B; }
  .tag-heartfelt { color: #3B6D11; }
  .tag-witty { color: #534AB7; }
  .tag-bold { color: #A32D2D; }

  .line-text {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: #1a1a1a;
    line-height: 1.65;
    padding-right: 2rem;
  }

  .line-tip {
    font-size: 12px;
    color: #aaa;
    margin-top: 8px;
    font-style: italic;
  }

  .copy-btn {
    position: absolute;
    top: 12px; right: 12px;
    background: none;
    border: 1px solid #eee;
    border-radius: 6px;
    cursor: pointer;
    color: #bbb;
    font-size: 15px;
    padding: 3px 6px;
    line-height: 1;
    transition: all 0.15s;
  }

  .copy-btn:hover { color: #D4537E; border-color: #D4537E; }

  .regen-btn {
    display: none;
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #D4537E;
    background: transparent;
    color: #993556;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.15s;
  }

  .regen-btn.visible { display: block; }
  .regen-btn:hover { background: #fff0f4; }

  .divider {
    border: none;
    border-top: 1px solid #f0e0d8;
    margin: 1.5rem 0 1rem;
  }

  @media (max-width: 500px) {
    .row { grid-template-columns: 1fr; }
    .row.three { grid-template-columns: 1fr 1fr; }
    .vibe-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="title">The Flirt Engine ✨</div>
    <div class="sub">Tell me the situation. I'll handle the charm.</div>
    <div class="pills">
      <span class="pill">💬 Witty</span>
      <span class="pill">🌹 Romantic</span>
      <span class="pill">😂 Funny</span>
      <span class="pill">💛 Heartfelt</span>
      <span class="pill">🎯 Smooth</span>
    </div>
  </div>

  <div class="card">
    <div class="section-label">The Setting</div>
    <div class="row" style="margin-bottom:12px;">
      <div class="field">
        <label>Location / Context</label>
        <input type="text" id="location" placeholder="coffee shop, gym, office…" />
      </div>
      <div class="field">
        <label>How you met / situation</label>
        <input type="text" id="situation" placeholder="bumped into, matched on app…" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">About them</div>
    <div class="row three">
      <div class="field">
        <label>Vibe / personality</label>
        <input type="text" id="personality" placeholder="nerdy, sporty, artsy…" />
      </div>
      <div class="field">
        <label>Interest / hobby</label>
        <input type="text" id="interest" placeholder="loves coffee, reads books…" />
      </div>
      <div class="field">
        <label>Something you noticed</label>
        <input type="text" id="detail" placeholder="always smiling, kind eyes…" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">About you (optional)</div>
    <div class="row" style="margin-bottom:12px;">
      <div class="field">
        <label>Your personality / style</label>
        <input type="text" id="myvibe" placeholder="sarcastic, goofy, shy…" />
      </div>
      <div class="field">
        <label>Any shared moment</label>
        <input type="text" id="shared" placeholder="both stuck in same queue…" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Tone — pick your flavour</div>
    <div class="vibe-grid" id="vibe-grid">
      <button class="vibe-btn selected" data-vibe="charming & smooth">🌹 Charming</button>
      <button class="vibe-btn" data-vibe="funny & playful">😂 Funny</button>
      <button class="vibe-btn" data-vibe="witty & clever">🧠 Witty</button>
      <button class="vibe-btn" data-vibe="warm & heartfelt">💛 Heartfelt</button>
      <button class="vibe-btn" data-vibe="nerdy & geeky">🤓 Nerdy</button>
      <button class="vibe-btn" data-vibe="bold & confident">🔥 Bold</button>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Anything else? (optional)</div>
    <textarea id="extra" placeholder="Extra context, inside jokes, language preference, emojis they use…"></textarea>
  </div>

  <button class="go-btn" id="go-btn" onclick="generateFlirt()">Generate my lines ✨</button>

  <div class="loading" id="loading">
    <span id="loading-text">Crafting something irresistible</span><span class="loading-dots"></span>
  </div>

  <div class="result-area" id="result-area">
    <hr class="divider" />
    <div class="result-label">Your lines — use wisely 💌</div>
    <div id="lines-container"></div>
    <button class="regen-btn" id="regen-btn" onclick="generateFlirt()">↺ Generate new lines</button>
  </div>
</div>

<script>
const loadingMessages = [
  "Brewing something irresistible",
  "Consulting the gods of charm",
  "Adding a pinch of butterflies",
  "Almost smooth enough"
];

let selectedVibe = "charming & smooth";
let loadingInterval;

document.getElementById('vibe-grid').addEventListener('click', function(e) {
  const btn = e.target.closest('.vibe-btn');
  if (!btn) return;
  document.querySelectorAll('.vibe-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedVibe = btn.dataset.vibe;
});

function copyLine(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = '<i class="ti ti-check"></i>';
    btn.style.color = '#3B6D11';
    btn.style.borderColor = '#3B6D11';
    setTimeout(() => {
      btn.innerHTML = '<i class="ti ti-copy"></i>';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 1600);
  });
}

async function generateFlirt() {
  const location = document.getElementById('location').value.trim();
  const situation = document.getElementById('situation').value.trim();
  const personality = document.getElementById('personality').value.trim();
  const interest = document.getElementById('interest').value.trim();
  const detail = document.getElementById('detail').value.trim();
  const myvibe = document.getElementById('myvibe').value.trim();
  const shared = document.getElementById('shared').value.trim();
  const extra = document.getElementById('extra').value.trim();

  if (!location && !situation && !personality && !interest && !detail) {
    alert("Give me at least a little to work with! Fill in some details about the situation or person.");
    return;
  }

  const goBtn = document.getElementById('go-btn');
  const loading = document.getElementById('loading');
  const resultArea = document.getElementById('result-area');
  const linesContainer = document.getElementById('lines-container');
  const regenBtn = document.getElementById('regen-btn');

  goBtn.disabled = true;
  loading.classList.add('visible');
  resultArea.classList.remove('visible');
  regenBtn.classList.remove('visible');
  linesContainer.innerHTML = '';

  let msgIdx = 0;
  document.getElementById('loading-text').textContent = loadingMessages[0];
  loadingInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMessages.length;
    document.getElementById('loading-text').textContent = loadingMessages[msgIdx];
  }, 1800);

  const contextParts = [];
  if (location) contextParts.push(`Location/context: ${location}`);
  if (situation) contextParts.push(`Situation/how you met: ${situation}`);
  if (personality) contextParts.push(`Their personality/vibe: ${personality}`);
  if (interest) contextParts.push(`Their interest/hobby: ${interest}`);
  if (detail) contextParts.push(`Something you noticed: ${detail}`);
  if (myvibe) contextParts.push(`Your personality/style: ${myvibe}`);
  if (shared) contextParts.push(`Shared moment/context: ${shared}`);
  if (extra) contextParts.push(`Extra context: ${extra}`);

  const prompt = `You are a warm, funny, and genuinely caring flirt coach who writes lines that feel REAL — not cringey, not generic. You blend fun, comedy, care, and genuine charm.

Given this situation:
${contextParts.join('\n')}

Desired tone: ${selectedVibe}

Generate exactly 3 flirting lines/openers as a JSON object:
{
  "lines": [
    {
      "tag": "Charming",
      "line": "...",
      "tip": "One casual delivery tip"
    },
    {
      "tag": "Funny",
      "line": "...",
      "tip": "..."
    },
    {
      "tag": "Heartfelt",
      "line": "...",
      "tip": "..."
    }
  ]
}

Rules:
- Make lines feel NATURAL and specific to the context, not generic
- Use the specific details provided — that's what makes lines feel real
- Let the desired tone (${selectedVibe}) influence all 3, but each should feel distinct
- "Heartfelt" = genuine warmth and care, not just flattery
- "Funny" = actually funny or charmingly self-deprecating
- "Charming" = smooth, specific, confident but not arrogant
- Keep each line under 2 sentences — punchy, confident
- Tips should be 1 casual sentence, practical
- Return ONLY valid JSON, no markdown, no extra text`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || "").join("");
    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);

    clearInterval(loadingInterval);
    loading.classList.remove('visible');
    goBtn.disabled = false;

    const tagClasses = {
      "Charming": "tag-charming",
      "Funny": "tag-funny",
      "Heartfelt": "tag-heartfelt",
      "Witty": "tag-witty",
      "Bold": "tag-bold"
    };

    parsed.lines.forEach(item => {
      const card = document.createElement('div');
      card.className = 'line-card';
      const tagClass = tagClasses[item.tag] || 'tag-charming';
      const safeText = item.line.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
      card.innerHTML = `
        <button class="copy-btn" onclick="copyLine('${item.line.replace(/'/g,"\\'")}', this)" aria-label="Copy line"><i class="ti ti-copy"></i></button>
        <div class="line-tag ${tagClass}">${item.tag}</div>
        <div class="line-text">"${item.line}"</div>
        <div class="line-tip">💡 ${item.tip}</div>
      `;
      linesContainer.appendChild(card);
    });

    resultArea.classList.add('visible');
    regenBtn.classList.add('visible');
    resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    clearInterval(loadingInterval);
    loading.classList.remove('visible');
    goBtn.disabled = false;
    linesContainer.innerHTML = '<div style="color:#A32D2D; font-size:14px; padding:1rem 0; text-align:center;">Something went wrong. Please try again!</div>';
    resultArea.classList.add('visible');
    console.error(err);
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.metaKey) generateFlirt();
});
</script>

</body>
</html>
