<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Krishna Kanth B — Résumé App</title>
<meta name="description" content="Krishna Kanth B — Data &amp; Insights Analyst with 8+ years turning complex data into decisions. Résumé presented as a polished iOS-style mobile app.">
<meta name="theme-color" content="#65a30d">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%2365a30d'/><text x='32' y='45' font-family='Arial,Helvetica,sans-serif' font-size='40' font-weight='bold' text-anchor='middle' fill='%23ffffff'>K</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="device" role="application" aria-label="Krishna Kanth B résumé mobile app">
  <div class="screen is-home">
    <div class="island" aria-hidden="true"><span class="cam"></span></div>

    <!-- Splash -->
    <div id="splash" aria-hidden="true">
      <div class="badge">K</div>
      <h1>Krishna Kanth B</h1>
      <p>Data &amp; Insights Analyst</p>
    </div>

    <!-- Status bar -->
    <div class="statusbar dark" id="statusbar" role="button" tabindex="0" aria-label="Open Notification Center">
      <span class="sb-left"><span id="clock">9:41</span></span>
      <span class="sb-mid" aria-hidden="true"></span>
      <span class="sb-right">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor" aria-hidden="true"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="5" width="3" height="7" rx="1"/><rect x="9" y="2.5" width="3" height="9.5" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor" aria-hidden="true"><path d="M8 2.6c2.1 0 4 .8 5.4 2.1l1.3-1.3C13 1.6 10.6.7 8 .7S3 1.6 1.3 3.4l1.3 1.3C4 3.4 5.9 2.6 8 2.6zM8 6c1.2 0 2.3.5 3.1 1.2l1.3-1.3C11.3 4.8 9.7 4.1 8 4.1s-3.3.7-4.4 1.8l1.3 1.3C5.7 6.5 6.8 6 8 6zm0 3.4l1.8-1.8c-.5-.4-1.1-.7-1.8-.7s-1.3.3-1.8.7L8 9.4z"/></svg>
        <span class="battery"><span class="batt-pct">100%</span><span class="batt-shell"><span class="batt-fill"></span></span></span>
      </span>
    </div>

    <!-- Notification Center (pull-down shade) -->
    <div class="noti" id="noti" role="dialog" aria-modal="true" aria-label="Notification Center" aria-hidden="true" tabindex="-1">
      <div class="noti-clock" aria-hidden="true">
        <div class="t" id="notiTime">9:41</div>
        <div class="d" id="notiDate">Today</div>
      </div>
      <div class="noti-list" id="notiList"></div>
      <div class="noti-grabber" aria-hidden="true"></div>
      <div class="noti-hint" aria-hidden="true">Swipe up or tap to close</div>
    </div>

    <!-- View stage -->
    <div class="stage" id="stage">

      <!-- HOME -->
      <section class="view" id="home" data-page="home" aria-label="Home screen">
        <div class="home-scroll">
          <div class="hero">
            <div class="avatar">K</div>
            <h1>Krishna Kanth B</h1>
            <p class="role">Data &amp; Insights Analyst</p>
            <p class="tag">8+ years turning complex data into decisions · SQL · Python · Tableau · Snowflake</p>
          </div>
          <div class="grid" id="appgrid"></div>
        </div>
        <nav class="dock" id="dock" aria-label="Dock"></nav>
      </section>

      <!-- Pages injected -->
      <section class="view" id="page-about" data-page="about" hidden></section>
      <section class="view" id="page-experience" data-page="experience" hidden></section>
      <section class="view" id="page-education" data-page="education" hidden></section>
      <section class="view" id="page-skills" data-page="skills" hidden></section>
      <section class="view" id="page-certifications" data-page="certifications" hidden></section>
      <section class="view" id="page-projects" data-page="projects" hidden></section>
      <section class="view" id="page-contact" data-page="contact" hidden></section>
    </div>

    <!-- Tab bar -->
    <nav class="tabbar" id="tabbar" aria-label="Primary">
      <button class="tab" data-tab="home" aria-selected="true" aria-label="Home tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
        <span>Home</span>
      </button>
      <button class="tab" data-tab="experience" aria-selected="false" aria-label="Experience tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        <span>Experience</span>
      </button>
      <button class="tab" data-tab="skills" aria-selected="false" aria-label="Skills tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5"/><path d="M4 19h16"/><rect x="7" y="11" width="3" height="5"/><rect x="12" y="7" width="3" height="9"/><rect x="17" y="13" width="3" height="3"/></svg>
        <span>Skills</span>
      </button>
      <button class="tab" data-tab="contact" aria-selected="false" aria-label="Contact tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="m4 7 8 6 8-6"/></svg>
        <span>Contact</span>
      </button>
    </nav>

    <div class="home-ind light" aria-hidden="true"></div>
  </div>
</div>

<p class="copyright">&copy; 2026 Krishna Kanth B (BKK)</p>

<script src="assets/js/main.js"></script>
</body>
</html>
