<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A clean analog + digital clock with light, dark, and system themes.">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f2ebda" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0e1320" media="(prefers-color-scheme: dark)">
  <meta property="og:title" content="Clock">
  <meta property="og:description" content="A clean analog + digital clock with light, dark, and system themes.">
  <title>Clock · KKB</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕐</text></svg>">
  <link rel="stylesheet" href="assets/base.css">
  <script>(function(){var m=localStorage.getItem('kkb-theme')||'system',d=m==='dark'||(m==='system'&&matchMedia('(prefers-color-scheme:dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');})();</script>
</head>
<body data-section="Dump" data-crumb="Clock" data-updated="June 16, 2026">
  <main class="page">
    <div class="card">
      <div class="clock-stage">
        <div class="clock-wrap">
          <svg id="clock-svg" viewBox="-50 -50 100 100">
            <circle cx="0" cy="0" r="49.5" class="clock-face"></circle>
            <circle cx="0" cy="0" r="2" class="clock-joint"></circle>
          </svg>
        </div>
        <div id="digital">--:--:--<small id="digital-date">&nbsp;</small></div>
      </div>
    </div>
  </main>

  <script src="assets/base.js" defer></script>
  <script>
  (function () {
    var svg = document.getElementById('clock-svg');
    var NUM = 60, step = 360 / NUM;

    function addHand(o) {
      o = o || {};
      var width = o.width != null ? o.width : 10,
          height = o.height != null ? o.height : 1.5,
          x = o.x != null ? o.x : 35,
          rotation = o.rotation || 0,
          cls = o.cls || 't1';
      var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      rect.setAttribute('width', width);
      rect.setAttribute('height', height);
      rect.setAttribute('x', x);
      rect.setAttribute('rx', height / 2);
      rect.setAttribute('class', cls);
      g.style.transform = 'rotate(' + (rotation - 90) + 'deg)';
      g.style.transformOrigin = '0px ' + (height / 2) + 'px';
      g.style.translate = '0px -' + (height / 2) + 'px';
      g.appendChild(rect);
      svg.appendChild(g);
      return g;
    }

    for (var i = 0; i < NUM; i++) {
      if (i % 15 === 0)      addHand({ rotation: i * step, cls: 'tq', width: 15 });
      else if (i % 5 === 0)  addHand({ rotation: i * step, cls: 't5', width: 12 });
      else                   addHand({ rotation: i * step, cls: 't1', width: 8 });
    }

    var secondHand = addHand({ cls: 'hand-s', width: 42, x: -8, height: 1 });
    var minuteHand = addHand({ cls: 'hand-m', width: 28, x: 0,  height: 1.6 });
    var hourHand   = addHand({ cls: 'hand-h', width: 18, x: 0,  height: 2.4 });

    var dig = document.getElementById('digital');
    var digDate = document.getElementById('digital-date');
    var pad = function (n) { return (n < 10 ? '0' : '') + n; };
    var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function render() {
      var t = new Date();
      var s = t.getSeconds(), m = t.getMinutes(), h = t.getHours();
      secondHand.style.transform = 'rotate(' + (s * 6 + 90) + 'deg)';
      minuteHand.style.transform = 'rotate(' + (m * 6 - 90) + 'deg)';
      hourHand.style.transform   = 'rotate(' + ((h % 12) * 30 + m * 0.5 - 90) + 'deg)';

      dig.firstChild.nodeValue = pad(h) + ':' + pad(m) + ':' + pad(s);
      digDate.textContent = days[t.getDay()] + ' · ' + t.getDate() + ' ' + months[t.getMonth()] + ' ' + t.getFullYear();
      requestAnimationFrame(render);
    }
    render();
  })();
  </script>
</body>
</html>
